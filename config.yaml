# ============================================
# 智能救生行为识别 Agent - 全局配置
# ============================================

# ---------- 模型运行模式 ----------
# "api"   → 调用云端 API（阿里云百炼千问）
# "local" → 调用本地 vLLM 部署的模型
model_mode: "local"

# ---------- 提示词模式 ----------
# "detailed" → 详细版提示词（更多特征描述，效果更好，token 消耗更高）
# "brief"    → 简练版提示词（轻量运行，token 消耗更低）
prompt_mode: "detailed"

# 千问云端 API 配置（model_mode = "api" 时生效）
qwen:
  api_key: ""                    # 也可通过环境变量 QWEN_API_KEY 设置
  api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 阿里云百炼 OpenAI 兼容接口
  model: "qwen3-vl-flash"       # 使用的模型
  max_tokens: 100
  temperature: 0.01              # 低温度以获得更确定性的结果
  timeout: 30                    # 请求超时（秒）

# 本地 vLLM 模型配置（model_mode = "local" 时生效）
local_model:
  api_key: "abc123"              # vllm serve 启动时设置的 --api-key（无鉴权则留空）
  api_url: "http://localhost:7890/v1"  # vLLM OpenAI 兼容接口地址
  model: "Qwen/Qwen3-VL-4B-AWQ"  # --served-model-name 设置的模型名
  max_tokens: 256                # Qwen3 thinking 模式需要足够 token，但 512 太慢
  temperature: 0.1
  timeout: 60                    # 本地推理可能更慢，给长一点

# 人体检测器配置
detector:
  model: "yolov8n.pt"            # YOLO 模型文件（自动下载）
  confidence: 0.15               # 检测置信度阈值（太低=噪声多，太高=漏检）
  device: "cuda:0"               # 推理设备: cpu 或 cuda:0
  class_ids: [0, 1, 2]           # 要检测的类别 ID 列表，全部当作"人"处理
                                  # 单个值也支持，如: 0（兼容旧配置的 class_id）
  detect_width: 0                # 检测推理宽度（0=保持原始分辨率，小目标场景不要缩放）
  detect_height: 0               # 检测推理高度（0=保持原始分辨率）
  nms_iou: 0.4                   # NMS IoU 阈值（小目标场景宜宽松，避免误杀）
  min_bbox_size: 8               # 最小检测框像素（小目标场景宜小，原默认20太严格）
  yolo_skip_frames: 0            # YOLO隔帧推理间隔。0=每帧推理，N=每N帧推理一次（节省资源）
  sahi_enabled: true             # 是否启用 SAHI 切片推理（提升小目标检出率，帧率会降低）
  sahi_batch_enabled: true       # SAHI 批量推理（true=批量快4-5倍，false=逐片兼容性好）
  half_precision: true           # FP16 半精度推理（GPU 加速 ~20%，CPU 不支持）
  sahi_slice_width: 420          # SAHI 切片宽度
  sahi_slice_height: 420         # SAHI 切片高度
  sahi_overlap: 0.1              # SAHI 切片重叠比例

# 目标跟踪配置（ByteTrack）
tracker:
  enabled: true                   # 是否启用目标跟踪
  tracker_type: "bytetrack"      # 跟踪器类型: bytetrack / botsort
  track_high_thresh: 0.3         # 高置信度跟踪阈值（小目标场景宜低）
  track_low_thresh: 0.15         # 低置信度跟踪阈值（ByteTrack 二次匹配）
  match_thresh: 0.6              # 匹配阈值（小目标场景宜宽松，允许更大 bbox 变化）
  track_buffer: 60               # 跟踪丢失后保留帧数（小目标容易短暂丢失，加大缓冲）
  with_reid: false               # BoT-SORT 是否启用 ReID 外观特征（需要额外下载模型）

# 关键帧提取配置
frame_extractor:
  padding_ratio: 0.15            # 正常 padding 倍率（大目标使用）
  keyframe_interval: 1           # 每隔几帧提取一帧关键帧
  keyframe_count: 1              # 提取的关键帧数量上限
  min_region_size: 32            # 最小有效区域像素（过小则跳过）
  adaptive_padding: true         # 自适应 padding（小目标自动放大 padding）
  pixel_threshold: 20000         # 最小裁剪面积阈值（像素²），低于此值自动增大 padding

# 行为类别定义（可扩展）
behavior_classes:
  - id: "0"
    label_cn: 溺水
    label_en: drowning
    severity: critical            # critical / warning / normal
    description: >
      四肢无规律挣扎，有溺水风险。

  - id: "1"
    label_cn: 游泳
    label_en: swimming
    severity: normal
    description: >
      人员在水中正常游泳。

  - id: "2"
    label_cn: 攀爬栏杆
    label_en: climbing
    severity: warning
    description: >
      人员攀爬或翻越栏杆。

  - id: "3"
    label_cn: 正常行走
    label_en: normal_walking
    severity: normal
    description: >
      岸上人员正常行走或站立。

  - id: "4"
    label_cn: 正在救援
    label_en: waterhelping
    severity: normal
    description: >
      水中人员抱住红色救生圈。

  - id: "5"
    label_cn: 在船上
    label_en: abord
    severity: normal
    description: >
      人员在船上或在开船。

# 视频源配置
video_source:
  camera_id: 0                   # USB 摄像头 ID
  rtsp_url: ""                   # RTSP 流地址
  frame_width: 640               # 目标帧宽度（0=保持原始）
  frame_height: 480              # 目标帧高度（0=保持原始）
  reconnect_threshold: 10        # 连续失败帧数触发重连
  reconnect_delay: 2.0           # 重连等待时间（秒）

# 输出配置
output:
  save_annotated: true           # 保存标注后的帧（save_video=true 时此项无效）
  save_video: false              # 保存标注后的视频（与 save_annotated 互斥，优先级更高）
  save_crops: true               # 保存人体裁剪图
  save_report: true              # 保存行为分析报告
  output_dir: "output"           # 输出目录
  report_format: "json"          # 报告格式: json / csv

# 流水线配置
pipeline:
  process_every_n_frames: 30     # 每 N 帧触发一次 API 调用（控制推理频率）
  buffer_size: 1                 # 历史帧缓冲区大小（仅追踪模式生效，控制 temporal 范围）
  max_concurrent: 20             # 最大并发 API 请求数（1=串行，≥2=启用并发线程池）
  alert_cooldown: 5              # 同一行为告警冷却时间（秒）
  display: true                  # 是否显示实时画面（需要 GUI）
  display_scale: 0.1             # 视频窗口缩放比例
  camera_interval: 0.1           # 摄像头调用间隔（秒）
  sustained_detection_frames: 1  # 连续N帧检测到目标才触发API调用
  concurrent_mode: false         # 是否启用外层并发模式（功能2）
                                 # false=级联模式（等Qwen出结果再继续）
                                 # true=并发模式（YOLO不等Qwen，结果异步出队按时间戳打印）
  max_queued_frames: 50          # 并发模式下最大队列帧数（防止内存溢出）
  display_input: false           # 是否显示输入源（摄像头时可选择）（功能4）
  display_output: true           # 是否显示输出画面（标注后的帧）（功能4）
  bbox_persist_seconds: 1.0      # 检测框在视频中持续显示时间（秒），0=不持续

# 摄像头日志配置
camera_log:
  enabled: true                  # 是否启用摄像头行为日志
  retention_hours: 2.0           # 日志保留时长（小时），超过自动删除
  log_filename: "camera_behavior_log.json"  # 日志文件名
